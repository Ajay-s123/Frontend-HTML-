<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Tag</title>
</head>
<body>
    <h3>Navigate to Kodnest</h3>

    <!-- Anchor Tag <a>- clickable Text    I t will display the elements in same line it is inline tag,  --> 
        <a href="https://www.kodnest.com">click here</a>
        <a href="https://www.facebook.com" target="_self">Click to visitFacebook</a> <!-- target="_self" opens the link in the same window(tab) -->
        <br>   <!-- br is a line break tag -->
        <a href="https://www.twitter.com" target="_blank">Click to visit Twitter</a> <!-- target="_blank" opens the link in a new window(tab) -->
    <!-- The attributes can be use in anchor tag are href, target, and title -->
<br>
    <a href="div.html" title="Visit Div Page">Click here to visit Div Page</a>
</body>
</html>
