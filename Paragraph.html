<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph</title>
</head>
<body>
    <!-- Case 1-->
    <p>Hello, Everyone</p>
    <p>How are you?</p>

    <!-- Case 2-->
     <p>Hi</p><p>Hello</p>

    <!-- Case 3-->
     <p>Hello     Hi!</p>
    <!-- Case 4-->
     <p>hello
        hi !
     </p>
    <!-- Case 5:   This is break tag which displays the text in new line-->
     <p>hello <br>hi     !</p>  <!-- it will display only one space if we gave a lot also-->

<!-- Case 6: This is pre (preformated) tag which displays the text in new line and also it will display the spaces as it is.-->
     <pre>Hello,      Ever
        yon     e!</pre>
</body>
</html>
