<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Tag</title>
</head>
<body>
    <center><h1>Div Tags</h1></center>
    <!--OR-->
    <h1 style="text-align: center;">Div Tags</h1>
    <!--Block level Element (div), other examples include p, h1-h6, pre-->
    <div>Hello</div>  <!--Div is occupy the complete width of its parent container-->
    <div>World</div>

    <!-- Inline Level Elements (span), other examples include img, a, strong -->
     <!--span will only occupy the width of its content, it always display the content in same line-->
    <span>This is inline</span>
    <span>This displayed in same line</span>
    <P>Feb batch students are <span style="color: red;">Konwledgable</span></P>
    <span>How was the yesterday's <span style="color: blue;">Class</span></span>

    <div style="background-color: aquamarine;">Section 1: Introduction
        <p>This is a paragraph inside the div.</p>
    </div>
    <div style="background-color: lightgray;">Section 2: Topics
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
    </div>


</body>
</html>
